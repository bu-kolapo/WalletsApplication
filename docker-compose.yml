version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: wallet_postgres
    environment:
      POSTGRES_DB: wallet_db        # 👈 matches DB_NAME
      POSTGRES_USER: admin          # 👈 matches DB_USERNAME
      POSTGRES_PASSWORD: admin      # 👈 matches DB_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wallet_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  wallet_app:
    build: .
    container_name: wallet_app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres             # 👈 matches DB_HOST
      DB_NAME: wallet_db            # 👈 matches DB_NAME
      DB_USERNAME: admin            # 👈 matches DB_USERNAME
      DB_PASSWORD: admin            # 👈 matches DB_PASSWORD
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wallet_network

networks:
  wallet_network:
    driver: bridge

volumes:
  postgres_data: