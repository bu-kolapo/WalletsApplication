apiVersion: v1
kind: Service
metadata:
  name: wallet-service
spec:
  type: NodePort
  selector:
    app: wallet-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432