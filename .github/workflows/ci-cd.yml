name: Wallets CI CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  # ─────────────────────────────
  # Stage 1: Build
  # ─────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build Application
        run: mvn clean package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wallet-jar
          path: target/*.jar

  # ─────────────────────────────
  # Stage 2: Test
  # ─────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run Unit Tests
        run: mvn test -Dtest="WalletServiceImplTest,AuthServiceImplTest,JwtUtilsTest"

      - name: Run Integration Tests
        run: mvn test -Dtest="WalletIntegrationTest" -Dspring.profiles.active=test

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/

  # ─────────────────────────────
  # Stage 3: Package
  # ─────────────────────────────
  package:
    name: Package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Package JAR
        run: mvn clean package -DskipTests

      - name: Upload Final JAR
        uses: actions/upload-artifact@v4
        with:
          name: wallet-final-jar
          path: target/*.jar

  # ─────────────────────────────
  # Stage 4: Docker Build
  # ─────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: wallet-final-jar
          path: target/

      - name: Build Docker Image
        run: docker build -t wallets-app:latest .

      - name: Verify Docker Image
        run: docker images wallets-app:latest